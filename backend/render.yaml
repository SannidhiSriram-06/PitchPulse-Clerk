services:
  - type: web
    name: pitchpulse-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pitchpulse-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CREWAI_TRACING_ENABLED
        value: "false"
databases:
  - name: pitchpulse-db
    plan: free
